name: Retract Plugin

on:
  workflow_dispatch:
    inputs:
      plugin_name:
        description: 'Plugin folder name to retract (e.g. my-plugin)'
        required: true
        type: string
      version:
        description: 'Specific version to retract (e.g. 1.2.3). Leave empty to retract all versions.'
        required: false
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  retract:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make retract script executable
        run: chmod +x .github/scripts/retract/run.sh

      - name: Retract plugin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          .github/scripts/retract/run.sh \
            "${{ inputs.plugin_name }}" \
            "${{ inputs.version }}"
